<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpaceTrack</title>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="logo">SpaceTrack</div>

      <div id="view-toggle">
        <button id="btn-globe" class="active">3D Globe</button>
        <button id="btn-map">2D Map</button>
      </div>

      <div id="filter-panel">
        <span class="filter-label">Orbit:</span>
        <label><input type="checkbox" data-orbit="LEO" checked /><span class="dot leo"></span>LEO</label>
        <label><input type="checkbox" data-orbit="MEO" checked /><span class="dot meo"></span>MEO</label>
        <label><input type="checkbox" data-orbit="GEO" checked /><span class="dot geo"></span>GEO</label>
      </div>

      <div id="object-count">8 objects</div>
    </header>

    <div id="view-container">
      <div id="globe-view"></div>
      <div id="map-view" class="hidden"></div>

      <aside id="sidebar" class="hidden">
        <button id="sidebar-close" aria-label="Close">✕</button>
        <div id="sidebar-content"></div>
      </aside>

      <div id="legend">
        <div class="legend-title">Orbit type</div>
        <div class="legend-item"><span class="dot leo"></span>LEO (&lt; 2,000 km)</div>
        <div class="legend-item"><span class="dot meo"></span>MEO (2,000 – 35,786 km)</div>
        <div class="legend-item"><span class="dot geo"></span>GEO (35,786 km)</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
